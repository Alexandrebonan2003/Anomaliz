version: "3.9"

# Usage
# ─────
# Start the API + MLflow UI:
#   docker-compose up
#
# Also start Ollama (local LLM for the agent):
#   docker-compose --profile llm up
#
# Before starting the API, train a bundle:
#   python -m anomaliz.training.cli --out artifacts/dev/
# Then set ANOMALIZ_ARTIFACT_DIR in .env or export it in the shell.

services:

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      ANOMALIZ_ARTIFACT_DIR: ${ANOMALIZ_ARTIFACT_DIR:-/app/artifacts/dev}
      ANOMALIZ__AGENT__BACKEND: ${ANOMALIZ__AGENT__BACKEND:-disabled}
      ANOMALIZ__AGENT__OLLAMA_BASE_URL: http://ollama:11434
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./artifacts:/app/artifacts:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    command: >
      mlflow ui
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlruns/mlflow.db
      --default-artifact-root /mlruns/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlruns
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - llm
    restart: unless-stopped

volumes:
  mlflow_data:
  ollama_data:
